services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-scraper_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scraper_password}
      POSTGRES_DB: ${DB_NAME:-linkedin_jobs}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-scraper_user} -d ${DB_NAME:-linkedin_jobs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper:
    build: .
    command: python -m scraper.main
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./core:/app/core
      - ./scraper:/app/scraper

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./core:/app/core
      - ./api:/app/api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
